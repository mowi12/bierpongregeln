name: Bug report
description: Report a reproducible problem in Bierpongregeln
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail so we can reproduce it quickly.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the actual behavior.
      placeholder: When I open ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: I expected ...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. Observe ...
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: Chrome 124 / Firefox 125 / Safari 17

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 14 / Windows 11 / Ubuntu 24.04
