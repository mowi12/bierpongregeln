name: Feature request
description: Suggest a new feature for Bierpongregeln
title: "[Feature]: "
labels:
  - feature
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Please describe the problem and proposal clearly.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      placeholder: It is hard to ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: We could add ...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: I also considered ...

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      placeholder: Any other context or screenshots ...
