name: Enhancement request
description: Suggest an improvement to an existing feature
title: "[Enhancement]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. This template is for improving existing features, not adding new ones.

  - type: textarea
    id: description
    attributes:
      label: What would you like to improve?
      placeholder: Currently ...
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: Current behavior
      placeholder: Right now the feature ...
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed improvement
      placeholder: It would be better if ...
    validations:
      required: true

  - type: textarea
    id: benefit
    attributes:
      label: User benefit
      placeholder: This would help users who ...
